<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malaria Detection — Upload</title>
    <style>
        /* ── Reset & Base ────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Card ────────────────────────────────────────────── */
        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 520px;
            width: 90%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .card h1 {
            font-size: 1.9rem;
            font-weight: 700;
            margin-bottom: 6px;
            background: linear-gradient(90deg, #00d2ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card p.subtitle {
            font-size: 0.95rem;
            color: #aaa;
            margin-bottom: 32px;
        }

        /* ── Dropzone ────────────────────────────────────────── */
        .dropzone {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 40px 20px;
            cursor: pointer;
            transition: border-color 0.3s, background 0.3s;
            margin-bottom: 24px;
        }

        .dropzone:hover,
        .dropzone.dragover {
            border-color: #7b2ff7;
            background: rgba(123, 47, 247, 0.08);
        }

        .dropzone .icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .dropzone .text {
            font-size: 0.95rem;
            color: #bbb;
        }

        .dropzone .filename {
            margin-top: 10px;
            font-size: 0.85rem;
            color: #7b2ff7;
            word-break: break-all;
        }

        /* ── Hidden file input ───────────────────────────────── */
        input[type="file"] { display: none; }

        /* ── Button ──────────────────────────────────────────── */
        .btn {
            display: inline-block;
            padding: 14px 40px;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #7b2ff7, #00d2ff);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(123, 47, 247, 0.45);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ── Flash messages ──────────────────────────────────── */
        .flash {
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid rgba(231, 76, 60, 0.4);
            color: #e74c3c;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔬 Malaria Detection</h1>
        <p class="subtitle">Upload a microscopic blood smear image to detect malaria parasites</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="flash">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form id="uploadForm" action="/predict" method="POST" enctype="multipart/form-data">
            <div class="dropzone" id="dropzone">
                <div class="icon">📤</div>
                <div class="text">Drag &amp; drop an image here, or <u>click to browse</u></div>
                <div class="filename" id="fileLabel"></div>
            </div>
            <input type="file" name="file" id="fileInput" accept="image/*">
            <button type="submit" class="btn" id="submitBtn" disabled>Analyse Image</button>
        </form>
    </div>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const submitBtn = document.getElementById('submitBtn');

        dropzone.addEventListener('click', () => fileInput.click());
        dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
        dropzone.addEventListener('drop', e => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                showFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) showFile(fileInput.files[0]);
        });

        function showFile(file) {
            fileLabel.textContent = file.name;
            submitBtn.disabled = false;
        }
    </script>
</body>
</html>
